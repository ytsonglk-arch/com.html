<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Fast Track Pro - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Abhaya+Libre:wght@700&display=swap');
        
        :root { --primary: #f59e0b; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; }
        .sinhala-font { font-family: 'Abhaya Libre', serif; }
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-border { border: 1px solid rgba(245, 158, 11, 0.3); box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); }
        
        /* Custom Animations */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideUp 0.5s ease forwards; }
        .streak-badge { background: linear-gradient(45deg, #f59e0b, #ef4444); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navbar / Header -->
    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-black font-black">F</div>
            <span class="font-extrabold text-lg tracking-tighter">FAST TRACK <span class="text-amber-500">2026</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                <i class="fas fa-fire text-orange-500"></i>
                <span id="streak-count" class="text-xs font-bold">0 Day Streak</span>
            </div>
            <button onclick="handleLogout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="pt-24 pb-32 px-6 max-w-4xl mx-auto">

        <!-- Auth Section (Hidden when logged in) -->
        <div id="auth-screen" class="hidden flex flex-col items-center justify-center min-h-[70vh]">
             <div class="glass p-8 rounded-[2rem] w-full max-w-md neon-border">
                <h2 id="auth-title" class="text-2xl font-black mb-6 text-center">ඇතුළු වන්න</h2>
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 mb-4 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-amber-500">
                <input type="password" id="auth-password" placeholder="Password" class="w-full p-4 mb-6 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-amber-500">
                <button onclick="handleAuth()" class="w-full p-4 bg-amber-500 text-black font-black rounded-xl shadow-lg">පටන් ගන්න</button>
             </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="animate-slide">
            
            <!-- Stats Grid -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-5 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-3 opacity-10 text-4xl"><i class="fas fa-chart-line"></i></div>
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">මගේ ප්‍රගතිය</span>
                    <h3 class="text-2xl font-black text-amber-500" id="avg-score">0%</h3>
                    <p class="text-[10px] text-gray-400 mt-1">සාමාන්‍ය ලකුණු</p>
                </div>
                <div class="glass p-5 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-3 opacity-10 text-4xl"><i class="fas fa-tasks"></i></div>
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">නිම කළ පාඩම්</span>
                    <h3 class="text-2xl font-black text-blue-500" id="completed-count">0</h3>
                    <p class="text-[10px] text-gray-400 mt-1">Quizzes නිම කර ඇත</p>
                </div>
            </div>

            <!-- Performance Chart -->
            <div class="glass p-6 rounded-[2rem] mb-8">
                <h4 class="text-xs font-bold text-gray-500 uppercase mb-4">ලකුණු විශ්ලේෂණය (Progress)</h4>
                <canvas id="scoreChart" class="max-h-48"></canvas>
            </div>

            <!-- Subject Cards -->
            <h4 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">විෂයන් තෝරන්න</h4>
            <div class="space-y-4">
                <div onclick="openSubject('Media Studies')" class="glass p-5 rounded-3xl flex items-center group cursor-pointer border-l-4 border-amber-500">
                    <div class="w-12 h-12 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500 mr-4"><i class="fas fa-microphone-alt"></i></div>
                    <div class="flex-1">
                        <h3 class="font-bold">Media Studies</h3>
                        <p class="text-[10px] text-gray-500 uppercase">මාධ්‍ය අධ්‍යයනය</p>
                    </div>
                    <i class="fas fa-arrow-right text-gray-700 group-hover:text-amber-500 transition"></i>
                </div>
                <!-- Add other subjects similarly -->
            </div>

            <!-- AI Study Assistant Floating Card -->
            <div class="mt-8 glass p-6 rounded-[2rem] border border-blue-500/30 bg-blue-500/5">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center"><i class="fas fa-robot text-white"></i></div>
                    <div>
                        <h4 class="font-bold text-sm">AI Study Assistant</h4>
                        <p class="text-[10px] text-blue-400">ඕනෑම දෙයක් අහන්න</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="ai-input" placeholder="පාඩම් ගැන ගැටලු අහන්න..." class="flex-1 bg-black/20 border border-white/5 p-3 rounded-xl text-sm outline-none">
                    <button onclick="askAI()" class="bg-blue-600 px-4 rounded-xl hover:bg-blue-500 transition"><i class="fas fa-paper-plane text-xs"></i></button>
                </div>
                <div id="ai-response" class="mt-4 text-xs text-gray-400 hidden sinhala-font leading-relaxed p-3 bg-black/30 rounded-xl"></div>
            </div>
        </div>

        <!-- Subject View (Hidden by default) -->
        <div id="subject-view" class="hidden animate-slide">
            <button onclick="closeSubject()" class="mb-6 text-gray-500 text-xs uppercase font-bold"><i class="fas fa-chevron-left mr-1"></i> Dashboard</button>
            <h2 id="current-sub-title" class="text-3xl font-black mb-8 text-amber-500 uppercase italic">Subject Name</h2>
            
            <div id="unit-list" class="space-y-3"></div>
            
            <!-- Quiz Area -->
            <div id="quiz-area" class="hidden space-y-6"></div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[2rem] p-2 flex justify-around items-center border border-white/10 shadow-2xl">
        <button onclick="showSection('home')" class="p-4 text-amber-500"><i class="fas fa-home"></i></button>
        <button onclick="showSection('flashcards')" class="p-4 text-gray-500"><i class="fas fa-clone"></i></button>
        <button onclick="showSection('ranking')" class="p-4 text-gray-500"><i class="fas fa-trophy"></i></button>
        <button onclick="showSection('profile')" class="p-4 text-gray-500"><i class="fas fa-user"></i></button>
    </div>

    <script>
        // --- 1. FIREBASE & APP CONFIG ---
        const firebaseConfig = { /* ඔබේ Firebase Config එක මෙතැනට */ };
        // Initialize Firebase... (මම කලින් කේතයේ පෙන්වූ පරිදි)

        let scoreHistory = [45, 52, 60, 58, 75, 82, 90]; // Mock Data for Chart

        // --- 2. PROGRESS CHART ---
        const ctx = document.getElementById('scoreChart').getContext('2d');
        const scoreChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6', 'Q7'],
                datasets: [{
                    label: 'Score %',
                    data: scoreHistory,
                    borderColor: '#f59e0b',
                    backgroundColor: 'rgba(245, 158, 11, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#4b5563', font: { size: 10 } } }
                }
            }
        });

        // --- 3. AI STUDY ASSISTANT (GEMINI INTEGRATION) ---
        async function askAI() {
            const input = document.getElementById('ai-input').value;
            const resBox = document.getElementById('ai-response');
            if(!input) return;

            resBox.innerHTML = "කල්පනා කරමින් පවතී... <i class='fas fa-spinner fa-spin ml-2'></i>";
            resBox.classList.remove('hidden');

            try {
                // සටහන: මෙහිදී සෘජුවම API Key එක පාවිච්චි නොකර Backend එකක් හරහා යැවීම වඩාත් ආරක්ෂිතයි.
                // මෙය උදාහරණයක් පමණි.
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=ඔබේ_API_KEY_එක`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: `A/L සිසුවෙකුට සරලව සිංහලෙන් පැහැදිලි කරන්න: ${input}` }] }] })
                });
                const data = await response.json();
                resBox.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resBox.innerHTML = "කණගාටුයි, AI සම්බන්ධ වීමට නොහැකි වුණා. පසුව උත්සාහ කරන්න.";
            }
        }

        // --- 4. CORE LOGIC (QUIZ, NAVIGATION, STREAKS) ---
        function openSubject(name) {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('subject-view').classList.remove('hidden');
            document.getElementById('current-sub-title').innerText = name;
            // Load Unit List...
        }

        function closeSubject() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('subject-view').classList.add('hidden');
        }

        // Streak System (Simple Logic)
        function checkStreak() {
            const lastVisit = localStorage.getItem('lastVisit');
            const today = new Date().toDateString();
            let streak = parseInt(localStorage.getItem('streak') || 0);

            if (lastVisit === today) return; // දැනටමත් අද ඇවිත්
            
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (lastVisit === yesterday.toDateString()) {
                streak++;
            } else {
                streak = 1;
            }

            localStorage.setItem('streak', streak);
            localStorage.setItem('lastVisit', today);
            document.getElementById('streak-count').innerText = `${streak} Day Streak`;
        }

        checkStreak();

        // Bookmark Logic
        let bookmarks = [];
        function toggleBookmark(questionId) {
            if(bookmarks.includes(questionId)) {
                bookmarks = bookmarks.filter(id => id !== questionId);
            } else {
                bookmarks.push(questionId);
            }
            alert("මෙම ප්‍රශ්නය ඔබගේ Bookmarks වලට එකතු කළා!");
        }

    </script>
</body>
</html>
